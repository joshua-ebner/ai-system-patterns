
services:
  rag-api:
    build:
      context: .
      dockerfile: apps/rag/Dockerfile
    container_name: rag-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
  
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: agent
    env_file:
      - .env
    environment:
      - RAG_API_URL=http://rag-api:8000/query
    depends_on:
      - rag-api
    stdin_open: true
    tty: true
